name: CI

on:
  pull_request:
    branches: [main, prod, dev]

jobs:
  branch-name-check:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-pass for prod merges
        if: github.base_ref == 'prod'
        run: echo "Branch name check not applicable for dev→prod merges"
      - name: Check branch name
        if: github.base_ref != 'prod'
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          PATTERN='^(feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert)(\/[a-z0-9._-]+)+$'
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch name '$BRANCH' does not match pattern: $PATTERN"
            echo ""
            echo "Expected format: <type>/<description>"
            echo "  Types: feat, fix, chore, docs, refactor, test, ci, build, perf, style, revert"
            echo "  Example: feat/add-vpc-peering"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid."

  pr-title-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert)(\(.+\))?\!?:'
          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title does not follow conventional commits format."
            echo ""
            echo "Expected format: <type>[(<scope>)][!]: <description>"
            echo "  Types: feat, fix, chore, docs, refactor, test, ci, build, perf, style, revert"
            echo "  Example: feat(networking): add VPC peering"
            exit 1
          fi
          echo "PR title is valid."

  ticket-reference-check:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-pass for dev PRs
        if: github.base_ref == 'dev'
        run: echo "Ticket reference check not required for dev PRs"
      - name: Check for issue reference
        if: github.base_ref != 'dev'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "::error::PR description is empty. Use the PR template."
            exit 1
          fi

          # Check that the "Issue:" field from the PR template is filled in
          # Matches "Issue: <something>" where <something> is not empty/placeholder
          ISSUE_LINE=$(echo "$PR_BODY" | grep -iP '^issue\s*:' | head -1 || true)

          if [ -z "$ISSUE_LINE" ]; then
            echo "::error::No 'Issue:' field found in PR description."
            echo ""
            echo "Use the PR template and fill in the Issue Reference section."
            echo "Example: Issue: https://hackurity.monday.com/boards/123/pulses/456"
            echo "         Issue: HACKU-123"
            echo "         Issue: #42"
            exit 1
          fi

          # Extract the value after "Issue:"
          ISSUE_VALUE=$(echo "$ISSUE_LINE" | sed -E 's/^[Ii]ssue\s*:\s*//')

          if [ -z "$ISSUE_VALUE" ]; then
            echo "::error::Issue reference is empty. Fill in the 'Issue:' field."
            echo ""
            echo "Example: Issue: https://hackurity.monday.com/boards/123/pulses/456"
            echo "         Issue: HACKU-123"
            echo "         Issue: #42"
            exit 1
          fi

          echo "Issue reference found: ${ISSUE_VALUE}"
